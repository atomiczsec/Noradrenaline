name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update"
        required: true
        type: string

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Linux modules
        run: make build PLATFORM=linux

      - name: Build native runner
        run: make test

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noradrenaline-linux
          path: "**/build/*.so"
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build macOS modules
        run: make build PLATFORM=mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noradrenaline-macos
          path: "**/build/*.dylib"
          if-no-files-found: error

  release:
    needs:
      - linux
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          find release-artifacts -type f \( -name "*.so" -o -name "*.dylib" \) | sort > release-files.txt

          if [[ ! -s release-files.txt ]]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            cat release-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Noradrenaline ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          body: |
            Noradrenaline native module release built from source.

            Includes Linux `.so` and macOS `.dylib` artifacts.
          draft: false
          prerelease: false
          files: ${{ steps.assets.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
